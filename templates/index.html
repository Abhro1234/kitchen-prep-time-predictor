<!DOCTYPE html>
<html>
<head>

<title>Smart Kitchen Intelligence</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>Smart Kitchen Intelligence</h1>
</header>

<div class="container">

    <!-- INPUT CARD -->
    <div class="input-card">

        <h2>Enter Kitchen Data</h2>

        <div class="input-grid">

            <div class="input-group">
                <label>Orders in Queue</label>
                <input id="orders" type="number" placeholder="e.g. 6">
            </div>

            <div class="input-group">
                <label>Average Prep Time (mins)</label>
                <input id="prep" type="number" placeholder="e.g. 20">
            </div>

            <div class="input-group">
                <label>Peak Hour</label>
                <select id="peak">
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                </select>
            </div>

            <div class="input-group">
                <label>Weekend</label>
                <select id="weekend">
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                </select>
            </div>

        </div>

        <button onclick="predict()">Predict</button>

    </div>


    <!-- RESULTS + CHART -->
    <div class="dashboard-row">

        <div class="results-card">

            <h2>Prediction Results</h2>

            <p>Prep Time: <span id="prepTime">--</span></p>

            <p>Kitchen Load: <span id="kitchenLoad">--</span></p>

            <p>Confidence: <span id="confidence">--</span></p>

        </div>

        <div class="chart-card">

            <h2>Live Kitchen Analytics</h2>

            <canvas id="prepChart"></canvas>

        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
